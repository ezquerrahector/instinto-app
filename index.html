<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>INSTINTO Etiquetas v2.2 Print Sharp</title>
<style>
  :root{
    --label-w: 38mm;
    --label-h: 58mm;
    --radius: 4mm;
    --ink:#15151a;
    --muted:#34343a;
    --bg:#f7f4ec;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; background:#ececec; color:var(--ink); font-family: Arial, Helvetica, sans-serif; }

  .toolbar{
    position:sticky; top:0; z-index:10;
    display:flex; flex-wrap:wrap; gap:10px; align-items:end;
    padding:12px; background:#111; color:white; box-shadow:0 2px 10px #0004;
  }
  .toolbar label{ display:flex; flex-direction:column; gap:4px; font-size:12px; }
  .toolbar input,.toolbar select{ min-width:170px; padding:8px; border-radius:8px; border:1px solid #555; }
  .toolbar button{ padding:9px 14px; border:0; border-radius:9px; font-weight:700; cursor:pointer; }
  .version{ margin-left:auto; font-size:12px; opacity:.8; }

  .sheet{
    width:210mm; min-height:297mm; margin:16px auto; padding:10mm;
    background:white; display:grid; grid-template-columns:repeat(4, var(--label-w));
    grid-auto-rows:var(--label-h); gap:4mm 4mm; align-content:start;
  }

  .label{
    width:var(--label-w); height:var(--label-h); border-radius:var(--radius);
    background:var(--bg); overflow:hidden; page-break-inside:avoid;
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
    color:var(--ink); position:relative;
  }

  .brand{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight:400;
    letter-spacing:3.9px;
    font-size:14.2pt;
    line-height:1;
    text-align:center;
    white-space:nowrap;
    transform:scaleX(.96);
    transform-origin:center;
  }
  .sub{
    font-family: Georgia, 'Times New Roman', serif;
    font-size:5.8pt;
    line-height:1.05;
    letter-spacing:1.05px;
    text-align:center;
    color:#55545a;
    font-weight:700;
    text-transform:uppercase;
  }
  .micro{
    font-size:6.2pt; letter-spacing:.7px; text-align:center; color:#2c2c32; font-weight:800;
  }
  .inspired{
    font-family: Georgia, 'Times New Roman', serif;
    font-size:6.1pt; letter-spacing:1.35px; text-align:center; color:#36363c; font-weight:700;
    margin-bottom:2mm;
  }
  .frag{
    font-family: Georgia, 'Times New Roman', serif;
    font-size:8.4pt; line-height:1.22; text-align:center; font-weight:800; color:#15151a;
    text-transform:uppercase; padding:0 3.2mm;
  }
  .ml{
    position:absolute; left:0; right:0; bottom:6.2mm;
    font-family: Georgia, 'Times New Roman', serif;
    font-size:8pt; letter-spacing:1.8px; text-align:center; color:#47474d; font-weight:700;
  }
  .line{
    width:28mm; margin:0 auto; border-top:1px dotted #555; opacity:.85;
  }

  /* FRENTE: más aire arriba, logo grande, ELIXIR más visible */
  .front{ padding:6.4mm 2.6mm 0; }
  .front .brand{ margin-bottom:3.4mm; }
  .front .sub{ margin-bottom:22.2mm; font-size:6.2pt; letter-spacing:1.15px; color:#4f4f55; }
  .front .inspired{ margin-bottom:3.1mm; }
  .front .frag{ font-size:8.2pt; }

  /* REVERSO: contenido bajado y legibilidad reforzada */
  .back{ padding:5.9mm 2.8mm 0; }
  .back .brand{ margin-bottom:4.2mm; }
  .back .sub{ margin-bottom:6.2mm; font-size:6.3pt; color:#4f4f55; }
  .qrbox{ width:21.5mm; height:21.5mm; margin:0 auto 2.5mm; display:flex; align-items:center; justify-content:center; }
  .qrbox img{ width:21.5mm; height:21.5mm; image-rendering:pixelated; }
  .code{ font-size:5.7pt; letter-spacing:.7px; text-align:center; font-weight:800; margin-bottom:3.2mm; }
  .back .frag{ font-size:7.25pt; line-height:1.18; padding:0 1.2mm; margin-bottom:4.4mm; }
  .prod{
    font-size:6.2pt; line-height:1.05; text-align:center; font-weight:900; color:#111;
    letter-spacing:.15px; margin-bottom:3.7mm;
  }
  .barcode{ width:31mm; height:10.8mm; margin:0 auto 3mm; display:block; }
  .pedidos{ font-size:6.1pt; letter-spacing:1px; text-align:center; font-weight:900; margin-bottom:1.1mm; }
  .phone{ font-size:10.7pt; letter-spacing:1.25px; text-align:center; font-weight:900; }

  @media print{
    @page{ size:A4; margin:0; }
    body{ background:white; }
    .toolbar{ display:none; }
    .sheet{ margin:0; padding:8mm; width:210mm; min-height:297mm; gap:3mm 3mm; box-shadow:none; }
    .label{ box-shadow:none; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <label>Nombre perfume<input id="perfume" value="OMNIA CRYSTALLINE — BVLGARI"></label>
    <label>Familia / línea<input id="subline" value="ELIXIR"></label>
    <label>Teléfono pedidos<input id="phone" value="81 20 28 21 20"></label>
    <label>Fecha producción<input id="prod" value="2026-05-15 22:38"></label>
    <label>QR URL<input id="qr" value="https://instintofragancias.com"></label>
    <label>Código interno<input id="code" value="INSPIRACIÓN"></label>
    <label>Copias<select id="copies"><option>8</option><option>12</option><option>16</option><option>20</option><option>24</option></select></label>
    <button onclick="render()">Actualizar</button>
    <button onclick="window.print()">Imprimir</button>
    <div class="version">v2.2 Print Sharp · frente/reverso corregidos</div>
  </div>
  <main class="sheet" id="sheet"></main>

<script>
function qrUrl(text){ return 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=8&data=' + encodeURIComponent(text); }
function barcodeSvg(text){
  const clean = (text||'INSTINTO').replace(/[^A-Z0-9]/gi,'').toUpperCase().slice(0,18) || 'INSTINTO';
  let x=0, bars='';
  for(let i=0;i<clean.length;i++){
    const n = clean.charCodeAt(i);
    const w = 0.45 + (n % 4)*0.16;
    const gap = 0.32 + (n % 3)*0.12;
    bars += `<rect x="${x.toFixed(2)}" y="0" width="${w.toFixed(2)}" height="100" fill="#111"/>`;
    x += w + gap;
    if(i%2===0){ bars += `<rect x="${x.toFixed(2)}" y="0" width="0.22" height="100" fill="#111"/>`; x += .48; }
  }
  return `data:image/svg+xml;utf8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${Math.max(x,30)} 100" preserveAspectRatio="none">${bars}</svg>`)}`;
}
function splitName(name){
  const s = (name||'').trim().toUpperCase();
  if(s.length <= 28) return s;
  const parts = s.split(' — ');
  if(parts.length === 2) return `${parts[0]} —<br>${parts[1]}`;
  return s.replace(/(.{1,24})(\s|$)/g,'$1<br>').replace(/<br>$/,'');
}
function front(data){
  return `<section class="label front">
    <div class="brand">INSTINTO</div>
    <div class="sub">${data.subline}</div>
    <div class="inspired">INSPIRADO EN:</div>
    <div class="frag">${splitName(data.perfume)}</div>
    <div class="ml">60 ML</div>
  </section>`;
}
function back(data){
  return `<section class="label back">
    <div class="brand">INSTINTO</div>
    <div class="qrbox"><img src="${qrUrl(data.qr)}" alt="QR"></div>
    <div class="code">${data.code}</div>
    <div class="frag">${splitName(data.perfume)}</div>
    <div class="prod">Producción: ${data.prod}</div>
    <img class="barcode" src="${barcodeSvg(data.perfume)}" alt="Código de barras">
    <div class="pedidos">PEDIDOS</div>
    <div class="phone">${data.phone}</div>
  </section>`;
}
function render(){
  const data = {
    perfume: document.getElementById('perfume').value,
    subline: document.getElementById('subline').value || 'ELIXIR',
    phone: document.getElementById('phone').value,
    prod: document.getElementById('prod').value,
    qr: document.getElementById('qr').value,
    code: document.getElementById('code').value
  };
  const copies = parseInt(document.getElementById('copies').value,10) || 8;
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = '';
  for(let i=0;i<copies/2;i++){ sheet.innerHTML += front(data) + back(data); }
}
render();
</script>
</body>
</html>
